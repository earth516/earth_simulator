<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>지구과학 시뮬레이터 대시보드</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
  :root {
    --bg: #070b16;
    --card-bg: #0f1626;
    --text: #e9edf6;
    --muted: #8b94ab;
    --accent-geo: #ff7a55; /* 지질: 주황 */
    --accent-atm: #5cd6e8; /* 대기: 민트 */
    --accent-oce: #2f6fb0; /* 해양: 파랑 */
    --accent-ast: #ffb84d; /* 천문: 노랑 */
  }
  * { box-sizing: border-box; }
  body {
    background: radial-gradient(1200px 700px at 50% 0%, #14213c 0%, rgba(20,33,60,0) 70%), var(--bg);
    color: var(--text);
    font-family: "Pretendard", sans-serif;
    margin: 0;
    padding: 40px 20px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  header { text-align: center; margin-bottom: 50px; }
  h1 { font-size: 2.5rem; font-weight: 800; margin: 0 0 10px 0; letter-spacing: -0.02em; }
  header p { color: var(--muted); margin: 0; font-size: 1.1rem; }
  
  /* 대시보드 그리드 */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 24px;
    max-width: 1200px;
    width: 100%;
  }
  
  /* 카테고리 카드 기본 스타일 */
  .category-card {
    background: linear-gradient(180deg, var(--card-bg), #131d31);
    border: 1px solid rgba(126, 148, 188, 0.16);
    border-radius: 20px;
    padding: 30px 24px;
    display: flex;
    flex-direction: column;
    box-shadow: 0 18px 50px -20px rgba(0,0,0,0.7);
  }
  .category-title { font-size: 1.4rem; font-weight: 700; margin: 0 0 16px 0; display: flex; align-items: center; gap: 8px; }
  
  /* 카테고리별 포인트 색상 상단 바 */
  .category-card.geo { border-top: 4px solid var(--accent-geo); }
  .category-card.atm { border-top: 4px solid var(--accent-atm); }
  .category-card.oce { border-top: 4px solid var(--accent-oce); }
  .category-card.ast { border-top: 4px solid var(--accent-ast); }
  
  .category-card.geo .category-title { color: var(--accent-geo); }
  .category-card.atm .category-title { color: var(--accent-atm); }
  .category-card.oce .category-title { color: var(--accent-oce); }
  .category-card.ast .category-title { color: var(--accent-ast); }

  /* 시뮬레이터 링크 목록 */
  .sim-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 12px; }
  .sim-item a {
    display: block;
    padding: 12px 16px;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(126, 148, 188, 0.1);
    border-radius: 10px;
    color: #cdd4e4;
    text-decoration: none;
    font-size: 0.95rem;
    font-weight: 500;
    transition: all 0.2s ease;
  }
  .sim-item a:hover {
    background: rgba(255, 255, 255, 0.08);
    color: #fff;
    transform: translateY(-2px);
  }
  
  /* 아직 준비중인 아이템 스타일 */
  .sim-item.ready a {
    opacity: 0.5;
    cursor: not-allowed;
    background: transparent;
    border-style: dashed;
  }
  .sim-item.ready a:hover { transform: none; color: #cdd4e4; }
</style>
</head>
<body>

<header>
  <h1>지구과학 시뮬레이션 아카이브</h1>
  <p>교과서 속 추상적인 개념들을 직관적인 시뮬레이션으로 탐구합니다.</p>
</header>

<main class="grid">
  <!-- 지질 -->
  <div class="category-card geo">
    <h2 class="category-title">🌋 지질학 (Geology)</h2>
    <ul class="sim-list">
      <li class="sim-item ready"><a href="#">준비 중인 시뮬레이션</a></li>
    </ul>
  </div>

  <!-- 대기 -->
  <div class="category-card atm">
    <h2 class="category-title">🌤️ 대기과학 (Atmosphere)</h2>
    <ul class="sim-list">
      <li class="sim-item ready"><a href="#">준비 중인 시뮬레이션</a></li>
    </ul>
  </div>

  <!-- 해양 -->
  <div class="category-card oce">
    <h2 class="category-title">🌊 해양학 (Oceanography)</h2>
    <ul class="sim-list">
      <li class="sim-item ready"><a href="#">준비 중인 시뮬레이션</a></li>
    </ul>
  </div>

  <!-- 천문 -->
  <div class="category-card ast">
    <h2 class="category-title">🌌 천문학 (Astronomy)</h2>
    <ul class="sim-list">
      <!-- 이 부분이 아까 올린 일식/월식 시뮬레이터와 연결되는 링크입니다 -->
      <li class="sim-item"><a href="./astronomy/eclipse/">일식 / 월식 시뮬레이터</a></li>
    </ul>
  </div>
</main>

</body>
</html>
