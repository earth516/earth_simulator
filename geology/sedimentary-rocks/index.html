<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>퇴적암 분류 실험실</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    :root {
      --bg: #0c0a07; --bg-2: #12100b; --panel: #1a160f; --panel-2: #221c12;
      --line: rgba(196,168,120,.16); --line-strong: rgba(196,168,120,.34);
      --text: #f1ece1; --muted: #b3a991; --muted-2: #8a8069;
      --geo: #e0913e; --geo-dim: rgba(224,145,62,.16);
      --clastic: #e0913e; --chemical: #6fb3e6; --organic: #7bbf6a;
      --shadow: 0 18px 50px -22px rgba(0,0,0,.8);
      --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; }
    body {
      background:
        radial-gradient(1100px 640px at 14% -10%, #2a1d0e 0%, rgba(42,29,14,0) 58%),
        radial-gradient(900px 600px at 90% 108%, #161a22 0%, rgba(22,26,34,0) 55%),
        var(--bg);
      color: var(--text);
      font-family: "Pretendard", "Pretendard Variable", system-ui, -apple-system, sans-serif;
      line-height: 1.6; letter-spacing: -.01em; -webkit-font-smoothing: antialiased; min-height: 100dvh;
    }
    .wrap { max-width: 1140px; margin: 0 auto; padding: clamp(16px, 3vw, 34px) clamp(14px, 3vw, 32px) 60px; }
    .topbar { display: flex; justify-content: space-between; align-items: center; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; }
    .home { display: inline-flex; align-items: center; gap: 7px; color: var(--muted); text-decoration: none; font: 600 13px/1 "Pretendard"; border: 1px solid var(--line); padding: 9px 13px; border-radius: 10px; transition: .16s; }
    .home:hover { color: var(--geo); border-color: var(--line-strong); }
    .credit { font: 500 12px/1.4 var(--mono); color: var(--muted-2); text-align: right; }
    .credit b { color: var(--muted); font-weight: 600; }
    .credit a { color: var(--geo); text-decoration: none; }
    header.top { margin-bottom: 18px; }
    .eyebrow { font: 600 12px/1 var(--mono); letter-spacing: .30em; text-transform: uppercase; color: var(--geo); opacity: .9; margin-bottom: 12px; }
    h1 { font-size: clamp(26px, 5vw, 44px); font-weight: 800; margin: 0; line-height: 1.05; letter-spacing: -.03em; }
    .stepper { margin: 14px 0 16px; background: linear-gradient(180deg, var(--panel), var(--bg-2)); border: 1px solid var(--line); border-radius: 16px; padding: 14px 16px; }
    .stepdots { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .sdot { appearance: none; border: 1px solid var(--line); background: transparent; color: var(--muted); min-width: 34px; height: 34px; border-radius: 10px; font: 700 12.5px/1 "Pretendard"; cursor: pointer; transition: .16s; padding: 0 10px; }
    .sdot:hover { border-color: var(--line-strong); color: var(--text); }
    .sdot[aria-current="true"] { background: var(--geo); color: #1a1206; border-color: var(--geo); box-shadow: 0 5px 16px -6px rgba(224,145,62,.6); }
    .sdot.done { color: var(--geo); border-color: rgba(224,145,62,.4); }
    .chcard { background: linear-gradient(180deg, var(--panel), var(--bg-2)); border: 1px solid var(--line); border-radius: 16px; padding: 18px clamp(16px, 2.5vw, 22px); margin-bottom: 16px; box-shadow: var(--shadow); }
    .chhead { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 10px; }
    .chno { font: 700 12px/1 var(--mono); letter-spacing: .10em; color: var(--geo); background: var(--geo-dim); border: 1px solid rgba(224,145,62,.3); padding: 6px 10px; border-radius: 8px; }
    .chtitle { font-size: 19px; font-weight: 800; margin: 0; letter-spacing: -.02em; }
    .chbody { font-size: 14.5px; color: #ddd3c2; margin: 0 0 12px; }
    .chbody b { color: #fff; font-weight: 700; }
    .chmeta { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    @media(max-width:680px){ .chmeta { grid-template-columns: 1fr; } }
    .mbox { border: 1px solid var(--line); border-radius: 11px; padding: 11px 13px; background: rgba(255,255,255,.015); }
    .mbox .l { font: 600 11px/1 var(--mono); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 6px; }
    .mbox.mission .l { color: var(--geo); } .mbox.key .l { color: var(--organic); }
    .mbox p { margin: 0; font-size: 13px; color: #cfc6b4; } .mbox p b { color: #fff; }
    .chnav { display: flex; gap: 10px; margin-top: 16px; align-items: center; }
    .chnav .spacer { flex: 1; }
    .navbtn { appearance: none; border: 1px solid var(--line-strong); background: var(--panel-2); color: var(--text); font: 700 14px/1 "Pretendard"; padding: 11px 18px; border-radius: 10px; cursor: pointer; transition: .16s; }
    .navbtn:hover:not(:disabled) { border-color: var(--geo); color: var(--geo); }
    .navbtn:disabled { opacity: .35; cursor: not-allowed; }
    .navbtn.next { background: var(--geo); color: #1a1206; border-color: var(--geo); }
    .navbtn.next:hover:not(:disabled) { filter: brightness(1.08); }
    .stage { display: grid; grid-template-columns: 1.5fr 1fr; gap: 16px; }
    @media(max-width:880px){ .stage { grid-template-columns: 1fr; } }
    .card { background: linear-gradient(180deg, var(--panel), var(--bg-2)); border: 1px solid var(--line); border-radius: 18px; overflow: hidden; box-shadow: var(--shadow); }
    .card .hd { display: flex; align-items: center; justify-content: space-between; padding: 13px 16px 11px; border-bottom: 1px solid var(--line); }
    .card .hd h2 { margin: 0; font-size: 13px; font-weight: 700; }
    .card .hd .sub { font: 500 11px/1 var(--mono); color: var(--muted-2); letter-spacing: .06em; }
    canvas { display: block; width: 100%; height: auto; }
    .right-col { display: flex; flex-direction: column; gap: 16px; }
    .verdict { padding: 16px; }
    .badge { display: inline-flex; align-items: center; gap: 9px; font-weight: 800; font-size: 17px; padding: 8px 15px; border-radius: 12px; background: var(--geo-dim); color: var(--geo); border: 1px solid rgba(224,145,62,.35); transition: .2s; }
    .badge.clastic { background: rgba(224,145,62,.15); color: var(--clastic); border-color: rgba(224,145,62,.4); }
    .badge.chemical { background: rgba(111,179,230,.14); color: var(--chemical); border-color: rgba(111,179,230,.4); }
    .badge.organic { background: rgba(123,191,106,.14); color: var(--organic); border-color: rgba(123,191,106,.4); }
    .badge.ok { background: rgba(123,191,106,.16); color: #9bdc86; border-color: rgba(123,191,106,.5); }
    .badge.no { background: rgba(224,90,62,.16); color: #ff8a66; border-color: rgba(224,90,62,.5); }
    .verdict p { margin: 13px 0 0; font-size: 13.5px; color: #ddd3c2; }
    .verdict p b { color: #fff; font-weight: 700; }
    .verdict .meta { margin-top: 10px; display: flex; gap: 8px; flex-wrap: wrap; }
    .pill { font: 600 11.5px/1 var(--mono); color: var(--muted); border: 1px solid var(--line); border-radius: 999px; padding: 6px 10px; }
    .controls { margin-top: 16px; background: linear-gradient(180deg, var(--panel), var(--bg-2)); border: 1px solid var(--line); border-radius: 18px; padding: 18px clamp(16px, 2.5vw, 24px); box-shadow: var(--shadow); }
    .panel-label { font: 600 11px/1 var(--mono); letter-spacing: .08em; text-transform: uppercase; color: var(--muted-2); margin-bottom: 12px; }
    .chips { display: flex; gap: 9px; flex-wrap: wrap; }
    .chip { appearance: none; border: 1px solid var(--line); background: var(--panel-2); color: var(--text); font: 700 14px/1 "Pretendard"; padding: 12px 18px; border-radius: 11px; cursor: pointer; transition: .16s; display: inline-flex; align-items: center; gap: 9px; }
    .chip:hover { border-color: var(--line-strong); }
    .chip[aria-pressed="true"] { background: var(--geo); color: #1a1206; border-color: var(--geo); }
    .chip .sw { width: 10px; height: 10px; border-radius: 3px; }
    .actions { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; align-items: center; }
    button.act { appearance: none; border: 1px solid var(--line-strong); background: var(--panel-2); color: var(--text); font: 700 14px/1 "Pretendard"; padding: 12px 18px; border-radius: 11px; cursor: pointer; transition: .16s; display: inline-flex; align-items: center; gap: 8px; }
    button.act:hover { border-color: var(--geo); color: var(--geo); }
    button.act.primary { background: var(--geo); color: #1a1206; border-color: var(--geo); }
    button.act.primary:hover { filter: brightness(1.08); }
    .actions .spacer { flex: 1; }
    .score { font: 700 13px/1 var(--mono); color: var(--muted); }
    .qbtns { display: flex; gap: 9px; flex-wrap: wrap; }
    .qbtn { appearance: none; border: 1px solid var(--line-strong); background: var(--panel-2); color: var(--text); font: 700 15px/1 "Pretendard"; padding: 14px 20px; border-radius: 12px; cursor: pointer; transition: .16s; }
    .qbtn:hover:not(:disabled) { border-color: var(--geo); color: var(--geo); }
    .qbtn:disabled { cursor: default; }
    .qbtn.correct { background: rgba(123,191,106,.2); border-color: #7bbf6a; color: #9bdc86; }
    .qbtn.wrong { background: rgba(224,90,62,.18); border-color: #e05a3e; color: #ff8a66; }
    .footnote { margin-top: 24px; font-size: 12.5px; color: var(--muted-2); max-width: 72ch; }
    .footnote b { color: var(--muted); }
  </style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <a class="home" href="../../index.html">◀ 지구과학 시뮬레이터 홈</a>
    <div class="credit"><b>만든이</b> SJ · <b>문의</b> <a href="mailto:cepheid@kakao.com">cepheid@kakao.com</a></div>
  </div>
  
  <header class="top">
    <div class="eyebrow">지구과학 시뮬레이터 · 지질</div>
    <h1>퇴적암 분류 실험실</h1>
  </header>

  <div class="stepper">
    <div class="stepdots" id="stepdots"></div>
  </div>

  <div class="chcard">
    <div class="chhead">
      <span class="chno" id="chno"></span>
      <h2 class="chtitle" id="chtitle"></h2>
    </div>
    <p class="chbody" id="chbody"></p>
    <div class="chmeta">
      <div class="mbox mission"><div class="l">해보기</div><p id="chmission"></p></div>
      <div class="mbox key"><div class="l">핵심 개념</div><p id="chkey"></p></div>
    </div>
    <div class="chnav">
      <button class="navbtn" id="btnPrev">◀ 이전 단계</button>
      <span class="spacer"></span>
      <button class="navbtn next" id="btnNext">다음 단계 ▶</button>
    </div>
  </div>

  <div class="stage">
    <div class="card">
      <div class="hd"><h2 id="leftTitle">퇴적 환경</h2><span class="sub" id="leftSub">단면 모식도 (과장)</span></div>
      <canvas id="cLeft" aria-label="퇴적이 일어나는 과정"></canvas>
    </div>
    
    <div class="right-col">
      <div class="card">
        <div class="hd"><h2 id="rightTitle">완성된 암석</h2><span class="sub">현미경/표본 모식도</span></div>
        <canvas id="cRight" aria-label="완성된 퇴적암 표본 고해상도 그래픽"></canvas>
      </div>
      
      <div class="card">
        <div class="verdict">
          <span class="badge" id="badge"><span id="badgeText">—</span></span>
          <p id="explain"></p>
          <div class="meta" id="meta"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="controls">
    <div class="panel-label" id="panelLabel">퇴적물 선택</div>
    <div id="panel"></div>
    <div class="actions" id="actions"></div>
  </div>

  <p class="footnote">
    <b>모식도 안내</b> · 퇴적 입자와 결정 구조, 암석 표본의 질감은 이해를 돕기 위해 시각적으로 과장되어 있습니다.<br>
    지질학적으로 <b>석회암</b>과 <b>처트</b>는 환경에 따라 <b>화학적 침전</b>과 <b>생물의 유해(유기적)</b> 양방향성 기원을 모두 가질 수 있습니다.
  </p>
</div>

<script>
(() => {
  "use strict";
  const el = id => document.getElementById(id);
  const cL = el("cLeft"), cR = el("cRight");
  const xL = cL.getContext("2d"), xR = cR.getContext("2d");

  function fit(cv, ctx, h) {
    const w = cv.clientWidth || cv.parentElement.clientWidth || 600;
    const dpr = Math.min(2.5, window.devicePixelRatio || 1);
    cv.width = Math.round(w * dpr);
    cv.height = Math.round(h * dpr);
    cv.style.height = h + "px";
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    return { w, h };
  }

  function rng(seed) {
    let s = seed || 1;
    return () => { s = (s * 9301 + 49297) % 233280; return s / 233280; };
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath(); ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r); ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r); ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  function lerp(a, b, t) { return a + (b - a) * t; }

  const ORIGIN = {
    "쇄설성": { cls: "clastic", col: "#e0913e" },
    "화학적": { cls: "chemical", col: "#6fb3e6" },
    "유기적": { cls: "organic", col: "#7bbf6a" }
  };

  const ROCKS = {
    "역암": { name: "역암", origin: "쇄설성", sed: "자갈, 모래, 점토", grain: "자갈 (2mm 초과)", tex: "conglomerate", note: "둥글게 마모된 자갈(원마도 높음)들이 모래와 점토 같은 세립질 매트릭스 사이에 단단히 박혀 결합해 있습니다." },
    "사암": { name: "사암", origin: "쇄설성", sed: "모래", grain: "모래 (1/16 ~ 2mm)", tex: "sandstone", note: "주로 석영 입자로 이루어진 모래알들이 잘 보이며, 표면을 만졌을 때 사포처럼 까끌까끌한 질감이 강하게 느껴집니다." },
    "셰일": { name: "셰일", origin: "쇄설성", sed: "점토", grain: "점토 (1/16mm 미만)", tex: "shale", note: "매우 미세한 점토 입자들이 수평으로 잔잔한 물속에서 퇴적되어, 얇은 층판 모양으로 결에 따라 쉽게 쪼개지는 성질(층리/엽리)이 발달합니다." },
    "응회암": { name: "응회암", origin: "쇄설성", sed: "화산재", grain: "화산 쇄설물 (화산재 등)", tex: "tuff", note: "화산 폭발 시 분출된 미세한 화산재와 각진 화산 유리 파편들이 인근 지역이나 수중에 쌓여 굳어진 특수 쇄설성 암석입니다." },
    "암염": { name: "암염", origin: "화학적", sed: "염화나트륨 (NaCl)", proc: "해수 증발", tex: "halite", note: "가두어진 바다나 염호의 물이 강력한 증발 작용을 받아 용해도가 낮은 소금(NaCl) 성분이 포화 상태에 이르러 입방체 결정으로 석출되었습니다." },
    "석회암_화": { name: "석회암 (화학적)", origin: "화학적", sed: "탄산칼슘 (CaCO₃)", proc: "화학적 침전", tex: "limestone", note: "따뜻하고 얕은 바다에서 칼슘 이온과 탄산 이온이 화학적으로 반응하여 낟알 모양의 탄산칼슘 결정으로 침전·고결된 암석입니다." },
    "처트_화": { name: "처트 (화학적)", origin: "화학적", sed: "규질 물질 (SiO₂)", proc: "화학적 침전", tex: "chert", note: "지하수나 해수 속의 이산화규소(SiO₂) 성분이 화학적으로 뭉쳐 침전된 암석으로, 유리질 광택을 띠며 경도가 매우 높아 날카롭게 깨집니다." },
    "석탄": { name: "석탄", origin: "유기적", sed: "식물체 유해", tex: "coal", note: "고생대나 중생대의 거대한 늪지대 식물체들이 썩지 않고 두껍게 매몰된 후, 지하의 열과 압력을 받아 탄소 성분만 농축된 유기적 퇴적암입니다." },
    "석회암_유": { name: "석회암 (유기적)", origin: "유기적", sed: "석회질 생물체 골격", tex: "limestone", note: "산호, 조개껍데기, 석회질 미생물(방추충 등)의 단단한 유해가 파쇄되거나 원형 그대로 겹겹이 쌓여 다져진 탄산칼슘 기원의 암석입니다." },
    "처트_유": { name: "처트 (유기적)", origin: "유기적", sed: "규질 생물체 골격", tex: "chert", note: "방산충(Radiolaria)이나 규조류 같이 이산화규소(SiO₃) 성분의 껍데기를 가진 미세 해양 생물들의 유해가 깊은 심해저에 쌓여 형성되었습니다." }
  };

  const PAL = {
    conglomerate: ["#9a8b73", ["#b9a98c", "#7e7563", "#a98f6f", "#c9c0b0", "#8a7f6a"]],
    sandstone: ["#c8a76d", null], shale: ["#5b626e", null], tuff: ["#8d9a8a", null],
    halite: ["#e6edf2", null], limestone: ["#d9d2bd", null], chert: ["#46423b", null], coal: ["#17171b", null]
  };

  /* 암석 표본 정밀 묘사 */
  function drawSample(ctx, bx, by, bw, bh, key, seed) {
    const r = ROCKS[key], tex = r.tex, rnd = rng(seed || key.length * 97 + tex.length * 13);
    ctx.save(); roundRect(ctx, bx, by, bw, bh, 12); ctx.clip();
    
    // 바탕색 채우기
    ctx.fillStyle = PAL[tex][0]; ctx.fillRect(bx, by, bw, bh);
    const N = () => bx + rnd() * bw, M = () => by + rnd() * bh;

    if (tex === "conglomerate") {
      const cols = PAL[tex][1];
      for (let i = 0; i < 22; i++) {
        const px = N(), py = M(), pr = 6 + rnd() * 16;
        ctx.fillStyle = cols[(rnd() * cols.length) | 0];
        ctx.beginPath(); ctx.ellipse(px, py, pr, pr * (.7 + rnd() * .4), rnd() * 6, 0, 7); ctx.fill();
        ctx.strokeStyle = "rgba(40,32,22,.45)"; ctx.lineWidth = 1; ctx.stroke();
      }
    } else if (tex === "sandstone") {
      for (let i = 0; i < 1100; i++) {
        const px = N(), py = M();
        ctx.fillStyle = rnd() < .5 ? "rgba(150,115,60,.5)" : "rgba(225,200,150,.5)";
        ctx.fillRect(px, py, 1.8, 1.8);
      }
    } else if (tex === "shale") {
      for (let y = by + 3; y < by + bh; y += 3 + rnd() * 2) {
        ctx.strokeStyle = `rgba(${30 + rnd() * 30 | 0}, ${36 + rnd() * 30 | 0}, ${48 + rnd() * 30 | 0}, .75)`;
        ctx.lineWidth = 1.4; ctx.beginPath(); ctx.moveTo(bx, y + Math.sin(y) * 1.5); ctx.lineTo(bx + bw, y); ctx.stroke();
      }
    } else if (tex === "tuff") {
      for (let i = 0; i < 800; i++) {
        const px = N(), py = M();
        ctx.fillStyle = rnd() < .5 ? "rgba(110,125,108,.5)" : "rgba(170,182,168,.4)";
        ctx.fillRect(px, py, 2, 2);
      }
      for (let i = 0; i < 14; i++) {
        ctx.fillStyle = "rgba(65,75,65,.6)"; ctx.beginPath(); ctx.moveTo(N(), M());
        for (let k = 0; k < 3; k++) ctx.lineTo(N(), M()); ctx.fill();
      }
    } else if (tex === "halite") {
      ctx.fillStyle = "#dbe6ee"; ctx.fillRect(bx, by, bw, bh);
      for (let i = 0; i < 28; i++) {
        const px = N(), py = M(), s = 12 + rnd() * 24;
        ctx.fillStyle = "rgba(255,255,255,.55)"; ctx.strokeStyle = "rgba(140,175,195,.7)"; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.rect(px, py, s, s); ctx.fill(); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(px + s * .28, py - s * .28);
        ctx.lineTo(px + s + s * .28, py - s * .28); ctx.lineTo(px + s, py);
        ctx.fillStyle = "rgba(255,255,255,.3)"; ctx.fill();
      }
    } else if (tex === "limestone") {
      for (let i = 0; i < 300; i++) {
        const px = N(), py = M();
        ctx.fillStyle = rnd() < .5 ? "rgba(185,175,150,.5)" : "rgba(235,228,210,.5)";
        ctx.beginPath(); ctx.arc(px, py, 1 + rnd() * 2.5, 0, 7); ctx.fill();
      }
      if ((key || "").includes("유")) {
        for (let i = 0; i < 12; i++) {
          const px = N(), py = M(); ctx.strokeStyle = "rgba(125,115,85,.6)"; ctx.lineWidth = 1.5;
          ctx.beginPath(); ctx.arc(px, py, 6 + rnd() * 9, 0.4, 3.5); ctx.stroke();
        }
      }
    } else if (tex === "chert") {
      for (let i = 0; i < 70; i++) {
        const px = N(), py = M(), pr = 8 + rnd() * 24;
        ctx.strokeStyle = `rgba(${85 + rnd() * 40 | 0}, ${65 + rnd() * 30 | 0}, ${55 + rnd() * 20 | 0}, .4)`;
        ctx.lineWidth = 1; ctx.beginPath(); ctx.arc(px, py, pr, 0, Math.PI * 1.3); ctx.stroke();
      }
    } else if (tex === "coal") {
      for (let y = by; y < by + bh; y += 5) {
        ctx.fillStyle = `rgba(${10 + rnd() * 15 | 0}, ${10 + rnd() * 15 | 0}, ${14 + rnd() * 15 | 0}, 1)`;
        ctx.fillRect(bx, y, bw, 4);
      }
      for (let i = 0; i < 12; i++) {
        const py = by + rnd() * bh; ctx.fillStyle = "rgba(130,130,145,.25)"; ctx.fillRect(bx, py, bw, 2);
      }
    }
    ctx.restore();
    ctx.strokeStyle = "rgba(255,255,255,.12)"; ctx.lineWidth = 1;
    roundRect(ctx, bx, by, bw, bh, 12); ctx.stroke();
  }

  /* 퇴적 분지 바탕 프레임 */
  function basin(ctx, w, h) {
    const waterTop = h * 0.22, floorY = h * 0.84;
    const air = ctx.createLinearGradient(0, 0, 0, waterTop);
    air.addColorStop(0, "#16130e"); air.addColorStop(1, "#201a10");
    ctx.fillStyle = air; ctx.fillRect(0, 0, w, waterTop);
    return { waterTop, floorY };
  }

  function water(ctx, w, top, bottom, alpha) {
    const g = ctx.createLinearGradient(0, top, 0, bottom);
    g.addColorStop(0, `rgba(65, 115, 145, ${alpha})`); g.addColorStop(1, `rgba(35, 75, 105, ${alpha})`);
    ctx.fillStyle = g; ctx.fillRect(0, top, w, bottom - top);
    ctx.strokeStyle = "rgba(140, 195, 220, .35)"; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(0, top); ctx.lineTo(w, top); ctx.stroke();
  }

  function label(ctx, x, y, t, col) {
    ctx.font = "600 12px Pretendard, sans-serif"; const pad = 6, wt = ctx.measureText(t).width;
    ctx.fillStyle = "rgba(12, 10, 7, .75)"; roundRect(ctx, x - pad, y - 13, wt + pad * 2, 19, 5); ctx.fill();
    ctx.fillStyle = col || "#cfc6b4"; ctx.textAlign = "left"; ctx.textBaseline = "middle";
    ctx.fillText(t, x, y - 2);
  }

  /* ── 캔버스 그리개 흐름 ── */
  function drawClastic() {
    const { w, h } = fit(cL, xL, Math.max(320, cL.clientWidth * 0.56)); const ctx = xL;
    ctx.clearRect(0, 0, w, h); const r = ROCKS[S.key]; const { waterTop, floorY } = basin(ctx, w, h);
    water(ctx, w, waterTop, floorY, .5); label(ctx, 12, waterTop + 16, "해수 (Water)", "#9fc7dd");

    const sizes = { "역암": 11, "사암": 4.5, "셰일": 1.8, "응회암": 2.5 };
    const cols = { "역암": "#b9a98c", "사암": "#d4b072", "셰일": "#7c8492", "응회암": "#9fb09a" };
    const gs = sizes[S.key], gc = cols[S.key];
    const bedH = lerp(6, floorY - waterTop - 10, S.prog) * 0.85, bedTop = floorY - bedH;

    // 가라앉는 입자들 역학 시뮬레이션
    const rnd = rng(7);
    for (let i = 0; i < 95; i++) {
      const x = rnd() * w; const fall = ((rnd() + S.prog * 1.3) % 1);
      const y = waterTop + 6 + fall * (bedTop - waterTop - 6);
      if (y < bedTop) {
        ctx.fillStyle = gc; ctx.globalAlpha = .85;
        if (S.key === "역암") {
          ctx.beginPath(); ctx.arc(x, y, gs * (.6 + rnd() * .5), 0, 7); ctx.fill();
        } else ctx.fillRect(x, y, gs, gs);
      }
    }
    ctx.globalAlpha = 1;

    // 점진적으로 누적되는 퇴적 바닥층
    ctx.save(); ctx.beginPath(); ctx.rect(0, bedTop, w, bedH); ctx.clip();
    ctx.fillStyle = PAL[r.tex][0]; ctx.fillRect(0, bedTop, w, bedH);
    const rnd2 = rng(31);
    if (S.key === "역암") {
      for (let i = 0; i < 55; i++) {
        const x = rnd2() * w, y = bedTop + rnd2() * bedH, pr = 5 + rnd2() * 9;
        ctx.fillStyle = PAL.conglomerate[1][(rnd2() * 5) | 0];
        ctx.beginPath(); ctx.arc(x, y, pr, 0, 7); ctx.fill();
        ctx.strokeStyle = "rgba(40,32,22,.3)"; ctx.stroke();
      }
    } else if (S.key === "셰일") {
      for (let y = bedTop + 3; y < floorY; y += 4) {
        ctx.strokeStyle = "rgba(40,46,58,.5)"; ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
      }
    } else {
      for (let i = 0; i < 600; i++) {
        const x = rnd2() * w, y = bedTop + rnd2() * bedH; ctx.globalAlpha = .4;
        ctx.fillStyle = gc; ctx.fillRect(x, y, gs * .8, gs * .8);
      }
      ctx.globalAlpha = 1;
    }
    ctx.restore();

    ctx.strokeStyle = "rgba(0,0,0,.4)"; ctx.beginPath(); ctx.moveTo(0, bedTop); ctx.lineTo(w, bedTop); ctx.stroke();
    label(ctx, 12, floorY - 12, r.name + " 퇴적층 (쇄설성)", ORIGIN[r.origin].col);
    label(ctx, w - 150, waterTop + 16, "중력 침전: 큰 입자가 급속 침강", "#cfc6b4");
  }

  function drawChemical() {
    const { w, h } = fit(cL, xL, Math.max(320, cL.clientWidth * 0.56)); const ctx = xL;
    ctx.clearRect(0, 0, w, h); const r = ROCKS[S.key]; const { waterTop, floorY } = basin(ctx, w, h);
    const evap = (S.key === "암염");
    const curTop = evap ? lerp(waterTop, floorY - 30, S.prog) : waterTop;

    if (evap) {
      // 강한 증발 태양 표현
      ctx.fillStyle = "#ffcf6a"; ctx.beginPath(); ctx.arc(w - 40, 32, 14, 0, 7); ctx.fill();
      ctx.strokeStyle = "rgba(255,190,100,.4)"; ctx.lineWidth = 1.5;
      for (let i = 0; i < 5; i++) {
        const x = 50 + i * ((w - 110) / 5); ctx.beginPath(); ctx.moveTo(x, curTop - 4); ctx.lineTo(x, curTop - 18);
        ctx.stroke(); ctx.beginPath(); ctx.moveTo(x, curTop - 18); ctx.lineTo(x - 3, curTop - 13);
        ctx.moveTo(x, curTop - 18); ctx.lineTo(x + 3, curTop - 13); ctx.stroke();
      }
      label(ctx, w - 150, curTop - 24, "해수 연속 증발 발생", "#ffcf6a");
    }
    
    water(ctx, w, curTop, floorY, .45);
    const bedH = lerp(6, floorY - waterTop - 35, S.prog) * 0.85, bedTop = floorY - bedH;

    if (!evap) {
      const rnd = rng(13);
      for (let i = 0; i < 65; i++) {
        const x = rnd() * w, fall = ((rnd() + S.prog * 1.4) % 1), y = curTop + 6 + fall * (bedTop - curTop - 6);
        if (y < bedTop) {
          ctx.fillStyle = S.key.includes("처트") ? "rgba(95,85,75,.7)" : "rgba(230,225,210,.7)";
          ctx.fillRect(x, y, 2.5, 2.5);
        }
      }
      label(ctx, w - 165, curTop + 16, "포화 상태에 따른 화학 침전", "#9fc7dd");
    }

    ctx.save(); ctx.beginPath(); ctx.rect(0, bedTop, w, bedH); ctx.clip();
    drawSample(ctx, -10, bedTop - 10, w + 20, bedH + 20, S.key, 77);
    ctx.restore();

    ctx.strokeStyle = "rgba(0,0,0,.3)"; ctx.beginPath(); ctx.moveTo(0, bedTop); ctx.lineTo(w, bedTop); ctx.stroke();
    label(ctx, 12, floorY - 12, r.name + " (" + r.proc + " 기원)", ORIGIN[r.origin].col);
  }

  function drawOrganic() {
    const { w, h } = fit(cL, xL, Math.max(320, cL.clientWidth * 0.56)); const ctx = xL;
    ctx.clearRect(0, 0, w, h); const r = ROCKS[S.key]; const { waterTop, floorY } = basin(ctx, w, h);
    water(ctx, w, waterTop, floorY, .5);
    const bedH = lerp(6, floorY - waterTop - 12, S.prog) * 0.85, bedTop = floorY - bedH;

    const rnd = rng(19);
    for (let i = 0; i < 48; i++) {
      const x = rnd() * w, fall = ((rnd() + S.prog * 1.2) % 1), y = waterTop + 6 + fall * (bedTop - waterTop - 6);
      if (y >= bedTop) continue;
      ctx.save(); ctx.translate(x, y); ctx.strokeStyle = "rgba(215,220,205,.65)"; ctx.lineWidth = 1;
      
      if (S.key === "석탄") {
        ctx.strokeStyle = "rgba(110,165,85,.75)"; ctx.beginPath(); ctx.moveTo(-5, 0); ctx.lineTo(5, 0);
        for (let k = -4; k <= 4; k += 2) { ctx.moveTo(k, 0); ctx.lineTo(k + 1, -3); } ctx.stroke();
      } else if (S.key.includes("석회암")) {
        ctx.beginPath(); ctx.arc(0, 0, 3.2, 0.3, 5.5); ctx.stroke();
      } else {
        ctx.beginPath(); ctx.arc(0, 0, 2.5, 0, 7); ctx.stroke();
        for (let a = 0; a < 4; a++) {
          const an = a / 4 * 6.28; ctx.moveTo(0, 0); ctx.lineTo(Math.cos(an) * 4, Math.sin(an) * 4);
        }
        ctx.stroke();
      }
      ctx.restore();
    }

    ctx.save(); ctx.beginPath(); ctx.rect(0, bedTop, w, bedH); ctx.clip();
    drawSample(ctx, -10, bedTop - 10, w + 20, bedH + 20, S.key, 55);
    ctx.restore();
    ctx.strokeStyle = "rgba(0,0,0,.3)"; ctx.beginPath(); ctx.moveTo(0, bedTop); ctx.lineTo(w, bedTop); ctx.stroke();

    if (S.prog > 0.65) {
      ctx.strokeStyle = "rgba(255,255,255,.35)"; ctx.lineWidth = 1.5;
      for (let i = 0; i < 4; i++) {
        const x = w * (0.2 + i * 0.2); ctx.beginPath(); ctx.moveTo(x, bedTop - 16); ctx.lineTo(x, bedTop - 4);
        ctx.lineTo(x - 3, bedTop - 9); ctx.moveTo(x, bedTop - 4); ctx.lineTo(x + 3, bedTop - 9); ctx.stroke();
      }
      label(ctx, w / 2 - 44, bedTop - 25, "매몰에 따른 다짐·교결 고화", "#cfc6b4");
    }
    label(ctx, 12, floorY - 12, r.name + " 형성 과정", ORIGIN[r.origin].col);
  }

  function drawStrata() {
    const { w, h } = fit(cL, xL, Math.max(320, cL.clientWidth * 0.56)); const ctx = xL;
    ctx.clearRect(0, 0, w, h);
    ctx.fillStyle = "linear-gradient(180deg, #171410, #0e0c08)";
    ctx.fillRect(0, 0, w, h);

    if (!S.layers.length) {
      ctx.fillStyle = "#8a8069"; ctx.font = "600 14px Pretendard"; ctx.textAlign = "center";
      ctx.fillText("아래 ‘＋ 퇴적 사건 추가’ 버튼을 눌러 교과서의 지층 누중을 재현하세요.", w / 2, h / 2);
      ctx.textAlign = "left"; return;
    }

    const n = S.layers.length, totH = h - 34, lh = Math.min(48, totH / n);
    let y = h - 15;
    
    S.layers.forEach((lk, i) => {
      const top = y - lh;
      ctx.save(); ctx.beginPath(); ctx.rect(10, top, w - 20, lh - 3); ctx.clip();
      drawSample(ctx, 10, top, w - 20, lh - 3, lk, 100 + i * 9);
      ctx.restore();

      const r = ROCKS[lk];
      label(ctx, 20, top + lh / 2, `[${i+1}층] ${r.name} (${r.origin} 기원)` + (i === 0 ? " ← 최초 퇴적층(최고령)" : (i === n - 1 ? " ← 최신 퇴적층(최연소)" : "")), ORIGIN[r.origin].col);
      y -= lh;
    });

    ctx.fillStyle = "#b3a991"; ctx.font = "700 12px Pretendard"; ctx.textAlign = "right";
    ctx.fillText("지층 누중의 법칙: 층리가 수평으로 중첩 형성됨", w - 16, 20); ctx.textAlign = "left";
  }

  function drawQuiz() {
    const { w, h } = fit(cL, xL, Math.max(320, cL.clientWidth * 0.56)); const ctx = xL;
    ctx.clearRect(0, 0, w, h);
    ctx.fillStyle = "#0c0a07"; ctx.fillRect(0, 0, w, h);
    
    if (!S.quiz) return;
    const m = Math.min(w * 0.55, h * 0.75), bx = (w - m) / 2, by = (h - m) / 2 - 5;
    drawSample(ctx, bx, by, m, m, S.quiz.key, S.quiz.seed);

    label(ctx, bx, by - 8, "미지의 표본 (핵심 힌트: 주로 " + ROCKS[S.quiz.key].sed + "이(가) 모여 생성됨)", "#e0c89a");
    if (S.quiz.answered) {
      const r = ROCKS[S.quiz.key];
      label(ctx, bx, by + m + 22, `결과 확인: [ ${r.name} ] — ${r.origin} 퇴적암 고유 질감`, ORIGIN[r.origin].col);
    } else {
      label(ctx, bx, by + m + 22, "하단 선택지에서 올바른 지구과학적 기원을 도출하세요.", "#8a8069");
    }
  }

  function drawRight() {
    const { w, h } = fit(cR, xR, 220); const ctx = xR; ctx.clearRect(0, 0, w, h);
    ctx.fillStyle = "#12100b"; ctx.fillRect(0, 0, w, h);

    if (CH[S.ci].special === "quiz") {
      ctx.fillStyle = "#8a8069"; ctx.font = "600 13px Pretendard"; ctx.textAlign = "center";
      ctx.fillText(S.quiz && S.quiz.answered ? "왼쪽에 정답 해설이 노출 중입니다." : "표본의 힌트를 읽고 하단 퀴즈에 응하세요.", w / 2, h / 2);
      ctx.textAlign = "left"; return;
    }
    if (CH[S.ci].special === "strata") {
      ctx.fillStyle = "#8a8069"; ctx.font = "600 13px Pretendard"; ctx.textAlign = "center";
      ctx.fillText("층리(Bedding): 공간적 상하 관계와", w / 2, h / 2 - 10);
      ctx.fillText("시간적 선후 관계를 동시에 지시함", w / 2, h / 2 + 10);
      ctx.textAlign = "left"; return;
    }

    const m = Math.min(w * 0.65, h * 0.85), bx = (w - m) / 2, by = (h - m) / 2;
    drawSample(ctx, bx, by, m, m, S.key, 42);
  }

  /* 자동 판정 및 설명 업데이트 */
  function updateVerdict() {
    const badge = el("badge");
    
    if (CH[S.ci].special === "quiz") {
      if (!S.quiz || !S.quiz.answered) {
        badge.className = "badge"; el("badgeText").textContent = "지학 계통 분류 평가";
        el("explain").innerHTML = "제시된 암석을 생성한 근원 퇴적물의 기원적 정의에 맞는 카테고리를 선택하세요.";
        el("meta").innerHTML = ""; return;
      }
      const r = ROCKS[S.quiz.key], ok = S.quiz.picked === r.origin;
      badge.className = "badge " + (ok ? "ok" : "no"); el("badgeText").textContent = ok ? "정답 판정 (Pass)" : "오류 판정 (Fail)";
      el("explain").innerHTML = `해당 암석은 <b>${r.name}</b>입니다. 기원: <b>${r.origin} 퇴적암</b>.<br>${r.note}`;
      el("meta").innerHTML = `<span class="pill">근원 물질: ${r.sed}</span><span class="pill">선택한 답: ${S.quiz.picked}</span>`;
      return;
    }

    if (CH[S.ci].special === "strata") {
      badge.className = "badge"; el("badgeText").textContent = "층리 구조 판정 완료";
      el("explain").innerHTML = "퇴적물의 입경 변화, 색조 변화, 성분 변화에 의해 지층 단면에 형성되는 수평선의 영구 구조입니다. 과거의 환경 대변동 주기를 알아낼 수 있습니다.";
      el("meta").innerHTML = `<span class="pill">누적 지층 수: ${S.layers.length}층</span><span class="pill">구조: 정합/평행 층리</span>`;
      return;
    }

    const r = ROCKS[S.key]; badge.className = "badge " + ORIGIN[r.origin].cls;
    el("badgeText").textContent = `${r.name} [${r.origin} 퇴적암]`;
    el("explain").innerHTML = r.note;
    
    let meta = `<span class="pill">퇴적물: ${r.sed}</span>`;
    if (r.grain) meta += `<span class="pill">입경 범위: ${r.grain}</span>`;
    if (r.proc) meta += `<span class="pill">동력학 기전: ${r.proc}</span>`;
    el("meta").innerHTML = meta;
  }

  function render() {
    const sp = CH[S.ci].special;
    if (sp === "strata") drawStrata();
    else if (sp === "quiz") drawQuiz();
    else if (CH[S.ci].id === "clastic") drawClastic();
    else if (CH[S.ci].id === "chemical") drawChemical();
    else drawOrganic();
    drawRight(); updateVerdict();
  }

  /* ── 애니메이션 타이머 제어 ── */
  let raf = null;
  function play() {
    if (S.playing) return; S.playing = true;
    if (el("btnPlay")) el("btnPlay").textContent = "⏸ 일시정지";
    S.prog = 0;
    const step = () => {
      S.prog = Math.min(1, S.prog + 0.012); render();
      if (S.prog < 1 && S.playing) raf = requestAnimationFrame(step);
      else {
        S.playing = false;
        if (el("btnPlay")) el("btnPlay").textContent = "▶ 퇴적 재생";
      }
    };
    raf = requestAnimationFrame(step);
  }

  function stopPlay() {
    S.playing = false; if (raf) cancelAnimationFrame(raf);
    if (el("btnPlay")) el("btnPlay").textContent = "▶ 퇴적 재생";
  }

  /* ── 단원 정보 데이터 ── */
  const CH = [
    { id: "clastic", title: "쇄설성 퇴적암 — 입자의 크기 기준",
      body: "기존의 암석이 풍화·침식 작용을 받아 부서진 기계적 파편 입자나 화산 분출물이 운반되어 중력 침강으로 굳어진 지층입니다. <b>지질학적 입경(크기)</b>에 의해서 결정적인 명칭이 선별됩니다.",
      mission: "하단의 칩형 선택기를 조작하여 역암·사암·셰일·응회암을 교체하고, ‘퇴적 재생’ 기능으로 입자 크기별 가라앉는 시간 격차와 최종 밀도를 분석하세요.",
      key: "자갈(2mm↑) 중심은 역암, 모래 중심은 사암, 미세 점토는 셰일, 화산재는 응회암으로 명명 구조를 이룹니다.",
      options: ["역암", "사암", "셰일", "응회암"], def: "사암" },
    { id: "chemical", title: "화학적 퇴적암 — 물의 증발 및 화학 침전",
      body: "물속에 이온 상태로 녹아 있던 규질, 탄산질 화합물이 <b>포화 상태 도달로 침전</b>되거나 급격한 <b>용매 증발</b>로 고체 결정화된 암석 군집입니다.",
      mission: "암염(해수 증발 기전)과 석회암·처트(용해도 격차 침전)를 토글 생산하고 두 화학 반응의 지질 단면 메커니즘을 상호 대조해 관찰하세요.",
      key: "NaCl의 석출은 암염을 만들고, CaCO₃의 평형 이동 침전은 석회암을, SiO₂의 순수 무기 침전은 처트를 이룩합니다.",
      options: ["암염", "석회암_화", "처트_화"], def: "암염" },
    { id: "organic", title: "유기적 퇴적암 — 생물체의 골격 및 유해 누적",
      body: "늪지식물이나 석회질·규질 성분을 추출해 단단한 껍데기를 형성했던 해양 미생물 군집의 <b>유해 생체 매몰체</b>가 지압에 의해 변성·고결된 암석입니다.",
      mission: "고생대 대삼림 식물(석탄)과 해양 미생물 껍데기(유기적 석회암/처트)를 교환 제조하며 기원적 특징을 연구하세요.",
      key: "석회암과 처트는 순수 화학 공정과 유기적 생물 작용 두 가지 성인(Origin) 모두로 태어날 수 있어 감별에 주의를 요합니다.",
      options: ["석탄", "석회암_유", "처트_유"], def: "석탄" },
    { id: "strata", special: "strata", title: "층리와 지층 누중 법칙의 구현",
      body: "지속적인 침강 환경에서 공급되는 입자의 종류나 퇴적 속도가 시간별로 편차를 일으키면 겹겹이 <b>평행한 조밀 층리</b>가 구축됩니다.",
      mission: "‘퇴적 사건 추가’를 무작위로 여러 번 연타하여 다중 지층을 생성하세요. 교과서에 명시된 역전되지 않은 지층의 하부 고령화 원리를 체득합니다.",
      key: "층리는 과거 지구의 수면 높낮이 변화, 환경의 변동 주기, 그리고 지층의 상하 역전 여부를 추적하는 핵심 척도입니다." },
    { id: "quiz", special: "quiz", title: "단원 요약평가: 실전 기원 분류 퀴즈",
      body: "지구과학 교과 과정의 퇴적암 분류 핵심 체계를 확인하는 완전 자동화 평가 시스템입니다.",
      mission: "제시되는 미지 표본의 주성분 힌트를 정밀 검사한 다음, 그것이 쇄설성·화학적·유기적 중 어디에 부합하는지 정답 유추 버튼을 누르세요.",
      key: "퇴적암 분류의 제1원칙은 암석명의 단순 암기가 아니라 ‘어떤 경로를 거쳐 집적된 물질인가’를 분류하는 능력을 키우는 것입니다." }
  ];

  const S = { ci: 0, key: "사암", prog: 1, playing: false, layers: [], quiz: null, score: { ok: 0, total: 0 } };

  function buildDots() {
    const c = el("stepdots"); c.innerHTML = "";
    CH.forEach((ch, i) => {
      const b = document.createElement("button"); b.className = "sdot" + (i < S.ci ? " done" : "");
      b.textContent = (i + 1); b.setAttribute("aria-current", i === S.ci ? "true" : "false");
      b.onclick = () => goto(i); c.appendChild(b);
    });
  }

  function buildPanel() {
    const ch = CH[S.ci], panel = el("panel"), actions = el("actions");
    panel.innerHTML = ""; actions.innerHTML = "";

    if (ch.special === "quiz") {
      el("panelLabel").textContent = "이 암석의 지질학적 기원 분류는?";
      const wrap = document.createElement("div"); wrap.className = "qbtns";
      ["쇄설성", "화학적", "유기적"].forEach(o => {
        const b = document.createElement("button"); b.className = "qbtn"; b.textContent = o + " 퇴적암";
        b.onclick = () => answerQuiz(o, wrap); wrap.appendChild(b);
      });
      panel.appendChild(wrap);

      const sc = document.createElement("span"); sc.className = "score"; sc.id = "scoreText";
      sc.textContent = `누적 성적: ${S.score.ok} / ${S.score.total} 문항 통과`;
      
      const nb = document.createElement("button"); nb.className = "act primary"; nb.textContent = "새로운 문제 추출 ↻";
      nb.onclick = () => newQuiz();
      actions.appendChild(nb); const sp = document.createElement("span"); sp.className = "spacer";
      actions.appendChild(sp); actions.appendChild(sc);

      if (!S.quiz) newQuiz(); else syncQuizButtons(wrap);
      return;
    }

    if (ch.special === "strata") {
      el("panelLabel").textContent = "지각 변동 조작 패널";
      const add = document.createElement("button"); add.className = "act primary"; add.textContent = "＋ 새로운 퇴적 사건 추가 (지층 누적)";
      add.onclick = () => {
        const pool = ["역암", "사암", "셰일", "응회암", "석회암_화", "암염", "석탄"];
        S.layers.push(pool[(Math.random() * pool.length) | 0]);
        if (S.layers.length > 6) S.layers.shift();
        render();
      };
      const clr = document.createElement("button"); clr.className = "act"; clr.textContent = "지층 전체 풍화·침식 (초기화)";
      clr.onclick = () => { S.layers = []; render(); };
      actions.appendChild(add); actions.appendChild(clr);
      return;
    }

    el("panelLabel").textContent = "퇴적물 성분 제어 (기원 제어)";
    const wrap = document.createElement("div"); wrap.className = "chips";
    ch.options.forEach(k => {
      const b = document.createElement("button"); b.className = "chip"; b.setAttribute("aria-pressed", k === S.key);
      const sw = document.createElement("span"); sw.className = "sw"; sw.style.background = ORIGIN[ROCKS[k].origin].col;
      b.appendChild(sw); b.appendChild(document.createTextNode(ROCKS[k].name.split(" ")[0]));
      b.onclick = () => {
        S.key = k; S.prog = 1; stopPlay();
        [...wrap.children].forEach(c => c.setAttribute("aria-pressed", "false"));
        b.setAttribute("aria-pressed", "true"); render();
      };
      wrap.appendChild(b);
    });
    panel.appendChild(wrap);

    const pl = document.createElement("button"); pl.className = "act primary"; pl.id = "btnPlay"; pl.textContent = "▶ 퇴적 재생";
    pl.onclick = () => { if (S.playing) stopPlay(); else { stopPlay(); play(); } };
    const rs = document.createElement("button"); rs.className = "act"; rs.textContent = "고결 완료 상사";
    rs.onclick = () => { stopPlay(); S.prog = 1; render(); };
    actions.appendChild(pl); actions.appendChild(rs);
  }

  function newQuiz() {
    const pool = Object.keys(ROCKS);
    const k = pool[(Math.random() * pool.length) | 0];
    S.quiz = { key: k, seed: (Math.random() * 9999) | 0, answered: false, picked: null };
    const wrap = el("panel").querySelector(".qbtns"); if (wrap) syncQuizButtons(wrap);
    render();
  }

  function syncQuizButtons(wrap) {
    [...wrap.children].forEach(b => { b.disabled = false; b.className = "qbtn"; });
  }

  function answerQuiz(picked, wrap) {
    if (!S.quiz || S.quiz.answered) return;
    S.quiz.answered = true; S.quiz.picked = picked;
    const correct = ROCKS[S.quiz.key].origin; S.score.total++;
    if (picked === correct) S.score.ok++;

    [...wrap.children].forEach(b => {
      const o = b.textContent.replace(" 퇴적암", ""); b.disabled = true;
      if (o === correct) b.classList.add("correct");
      else if (o === picked) b.classList.add("wrong");
    });
    const st = el("scoreText"); if (st) st.textContent = `누적 성적: ${S.score.ok} / ${S.score.total} 문항 통과`;
    render();
  }

  function applyChapter() {
    const ch = CH[S.ci]; stopPlay();
    el("chno").textContent = "지층 탐구 0" + (S.ci + 1) + " / 0" + CH.length;
    el("chtitle").textContent = ch.title; el("chbody").innerHTML = ch.body;
    el("chmission").innerHTML = ch.mission; el("chkey").innerHTML = ch.key;

    el("leftTitle").textContent = ch.special === "strata" ? "지층 단면 누중 모델" : (ch.special === "quiz" ? "미지의 암석 감별 코너" : "분지 내 퇴적 환경 모식도");
    el("leftSub").textContent = ch.special ? "실시간 연산 모드" : "물리 역학 단면 (과장)";
    el("rightTitle").textContent = ch.special === "quiz" ? "자동 판정 프레임" : (ch.special === "strata" ? "수평 층리 요약" : "완성된 지성 암석 고해상도 표본");

    el("btnPrev").disabled = S.ci === 0; el("btnNext").disabled = S.ci === CH.length-1;
    if (ch.options) { S.key = ch.def; S.prog = 1; }
    
    buildDots(); buildPanel(); render();
    document.querySelector(".chcard").scrollIntoView({ behavior: "smooth", block: "nearest" });
  }

  function goto(i) { S.ci = Math.max(0, Math.min(CH.length - 1, i)); applyChapter(); }

  el("btnPrev").onclick = () => goto(S.ci - 1);
  el("btnNext").onclick = () => goto(S.ci + 1);

  window.addEventListener("resize", () => {
    clearTimeout(window.__rt); window.__rt = setTimeout(render, 150);
  });

  applyChapter();
})();
</script>
</body>
</html>
